<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Font Awesome Library -->
    <link rel="stylesheet" href="CSS/all.min.css">
    <!-- CSS Dosyaları -->
    <link rel="stylesheet" href="CSS/bootstrap.min.css">
    <link rel="stylesheet" href="CSS/master.css">
    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
    <script src="https://code.jquery.com/jquery-3.3.1.js"
        integrity="sha256-2Kok7MbOyxpgUVvAk/HJ2jigOSYS2auK4Pfzbm7uH60=" crossorigin="anonymous">
        </script>
    <script>
        $(function () {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>
    <title>Ana Sayfa</title>
</head>

<body>
    <header id="header"></header>
    <main>
        <section class="iletisim-sayfa">
            <div class="container">
                <img src="images/dotes.svg" alt="dotes">
                <div class="info">
                    <h1>BİZE ULAŞIN</h1>
                    <p>İletişime geçmek için formu doldurun.</p>
                    <img src="images/iletisim.png" alt="photo">
                </div>
                <div class="form">
                    <form action="php/iletisim.php" method="post">
                        <div>
                            <div>
                                <label for="ad">Adınız</label>
                                <input type="text" name="ad" id="Ad">
                            </div>
                            <div>
                                <label for="sayad">Soyadınız</label>
                                <input type="text" name="sayad" id="Sayad">
                            </div>
                        </div>
                        <div>
                            <label for="mail">E-Posta</label>
                            <input type="email" name="mail" id="Mail">
                        </div>
                        <div>
                            <label for="telefon">Telefonunuz</label>
                            <input type="text" name="telefon" id="Telefon">
                        </div>
                        <div>
                            <label for="konu">İhtiyaçlarınıza en uygun konu hangisi?</label>
                            <select name="konu" id="Konu" aria-placeholder="Lütfen seçin">
                                <option value="Öneri" disabled selected>Lütfen seçin</option>
                                <option value="Öneri">Öneri</option>
                                <option value="Şikayet">Şikayet</option>
                                <option value="Başka">Başka</option>
                            </select>
                        </div>
                        <div>
                            <label for="mesaj">Nasıl yardımcı olabiliriz?</label>
                            <textarea name="mesaj" id="Mesaj"
                                placeholder="Lütfen yardımcı olmamızı istediğiniz konuları paylaşın"></textarea>
                        </div>
                        <div>
                            <input type="button" value="Sıfırla">
                            <input type="submit" value="Gönder">
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer id="footer"></footer>
    <script src="JS/bootstrap.js"></script>
</body>

</html>
